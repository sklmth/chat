name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: 114.132.197.182
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/chat || git clone https://github.com/sklmth/chat /var/www/chat && cd /var/www/chat
            git pull origin main
            npm install --production
            pm2 reload chat || pm2 start server.js --name chat
